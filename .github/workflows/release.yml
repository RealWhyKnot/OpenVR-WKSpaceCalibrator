name: Release

# Triggered by pushing a tag like v2026.4.27.0 (release; .N = release iteration for the day,
# starting at 0). Dev-style tags v2026.4.27.7-4974 are accepted but rare on the release stream
# — the -XXXX suffix is for local dev builds where rebuilds at the same daily counter need
# disambiguating. The tag (minus the leading "v") drives the build's version: it's passed to
# build.ps1 -Version so the zip filename, version.txt, and embedded version all match the tag.
# build.ps1 validates the shape and fails fast on a malformed tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Share a concurrency group with changelog-append so an appender push can't
# race with a release build and add an Unreleased entry that the release itself
# doesn't carry. Only one of the two workflows runs at a time.
concurrency:
  group: changelog-append
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Unreleased -> tagged section
        shell: pwsh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./.github/scripts/Update-Changelog.ps1 -Mode Promote -Version '${{ github.ref_name }}'
          # Stash the promoted files BEFORE build.ps1 mutates the worktree so we can
          # replay the exact bytes to main after the release ships.
          New-Item -ItemType Directory -Force -Path .changelog-stash/wiki | Out-Null
          Copy-Item CHANGELOG.md       .changelog-stash/CHANGELOG.md       -Force
          Copy-Item wiki/Changelog.md  .changelog-stash/wiki/Changelog.md  -Force

      - name: Build distribution
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Strip the leading "v" so the version baked into the build matches the tag.
          # build.ps1 validates the shape (YYYY.M.D.N or YYYY.M.D.N-XXXX) and fails fast
          # on a malformed tag.
          $version = $env:TAG_NAME -replace '^v', ''
          ./build.ps1 -Version $version

      - name: Install NSIS
        shell: pwsh
        run: |
          # makensis is not preinstalled on windows-latest. chocolatey is.
          # Chocolatey's community feed occasionally returns 504s during peak hours
          # (a 504 broke a release on 2026-04-28); retry up to 3 times with backoff
          # before giving up. Fall back to direct download from sourceforge if
          # chocolatey stays down.
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          $installed = $false
          for ($i = 1; $i -le 3 -and -not $installed; $i++) {
              Write-Host "choco install nsis (attempt $i/3)..."
              choco install nsis -y --no-progress
              if ($LASTEXITCODE -eq 0 -and (Test-Path $makensis)) {
                  $installed = $true
                  break
              }
              if ($i -lt 3) {
                  Write-Host "Attempt $i failed; sleeping 15s before retry..."
                  Start-Sleep -Seconds 15
              }
          }

          if (-not $installed) {
              # Fallback: pull NSIS directly from sourceforge. Slower but bypasses
              # the chocolatey community feed entirely.
              Write-Host "Chocolatey failed all attempts; falling back to direct sourceforge download."
              $nsisUrl = "https://sourceforge.net/projects/nsis/files/NSIS%203/3.10/nsis-3.10-setup.exe/download"
              $nsisInstaller = Join-Path $env:RUNNER_TEMP "nsis-setup.exe"
              Invoke-WebRequest -Uri $nsisUrl -OutFile $nsisInstaller -UseBasicParsing -MaximumRedirection 5
              & $nsisInstaller /S | Out-Null
              if (-not (Test-Path $makensis)) {
                  throw "makensis.exe not found at $makensis after both chocolatey and sourceforge fallback."
              }
          }
          Write-Host "makensis: $makensis"

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          # The .nsi bundles vcredist_x64.exe via an !ifdef BUNDLE_VCREDIST guard so
          # local makensis runs (without this download step) still build a working
          # installer that just doesn't include the redistributable. CI always bundles.
          $url = 'https://aka.ms/vs/17/release/vc_redist.x64.exe'
          $out = Join-Path $PWD 'install\vcredist_x64.exe'
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          if (-not (Test-Path $out)) { throw "vcredist download failed (file not found at $out)." }
          $size = (Get-Item $out).Length
          Write-Host "Downloaded vcredist_x64.exe: $size bytes"
          if ($size -lt 1000000) { throw "vcredist download appears truncated ($size bytes)." }

      - name: Build NSIS installer
        id: installer
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Derive a 4-part dotted numeric version for NSIS's VIProductVersion, which rejects
          # non-numeric components. Tag shapes (after stripping the leading "v"):
          #   Release: YYYY.M.D.N           -> use as-is
          #   Dev:     YYYY.M.D.N-XXXX      -> drop the -XXXX hex suffix
          $version = $env:TAG_NAME -replace '^v', ''
          $numeric = $version -replace '-[A-Fa-f0-9]+$', ''
          if ($numeric -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              throw "Could not derive a 4-part numeric version from tag '$env:TAG_NAME' (got '$numeric')."
          }
          Write-Host "Installer VERSION define: $numeric"

          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          $script   = Join-Path $PWD "install\installer.nsi"

          # /V3 = informational verbosity. /DVERSION overrides the !ifndef'd default in the .nsi
          # so the embedded version matches the release tag. /DBUNDLE_VCREDIST flips on the
          # vcredist File + ExecWait inside the .nsi (only safe when the download step above
          # has staged install/vcredist_x64.exe).
          & $makensis /V3 "/DVERSION=$numeric" /DBUNDLE_VCREDIST $script
          if ($LASTEXITCODE -ne 0) {
              throw "makensis failed with exit code $LASTEXITCODE."
          }

          # OutFile in installer.nsi is "SpaceCalibrator.exe" (relative), so it lands next to the
          # script in install/.
          $installer = Join-Path $PWD "install\SpaceCalibrator.exe"
          if (-not (Test-Path $installer)) { throw "Installer not produced at $installer." }

          # Rename to include the version so the GitHub release asset name is unambiguous.
          $named = Join-Path $PWD "install\OpenVR-SpaceCalibrator-$version-Setup.exe"
          if (Test-Path $named) { Remove-Item -Force $named }
          Move-Item -Path $installer -Destination $named

          $hash = (Get-FileHash $named -Algorithm SHA256).Hash
          "path=$named"                  >> $env:GITHUB_OUTPUT
          "name=$(Split-Path $named -Leaf)" >> $env:GITHUB_OUTPUT
          "sha256=$hash"                 >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $named"
          Write-Host "SHA256: $hash"

      - name: Locate release zip
        id: zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem release/OpenVR-SpaceCalibrator-*.zip | Select-Object -First 1
          if (-not $zip) { throw "No release zip found in release/ — build.ps1 did not produce one." }
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash
          "path=$($zip.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($zip.Name)"     >> $env:GITHUB_OUTPUT
          "sha256=$hash"          >> $env:GITHUB_OUTPUT
          Write-Host "Release zip: $($zip.Name)"
          Write-Host "SHA256: $hash"

      - name: Compose release body
        id: compose
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          INSTALLER_PATH: ${{ steps.installer.outputs.path }}
          INSTALLER_SHA: ${{ steps.installer.outputs.sha256 }}
          INSTALLER_NAME: ${{ steps.installer.outputs.name }}
          ZIP_PATH: ${{ steps.zip.outputs.path }}
          ZIP_SHA: ${{ steps.zip.outputs.sha256 }}
          ZIP_NAME: ${{ steps.zip.outputs.name }}
        run: |
          # Construct the final release body by hand from typed inputs (env
          # vars + the slice file), NOT by interpolating ${{ ... }} into a
          # PowerShell here-string. Inline GHA expressions in here-strings
          # have bitten this workflow before (PowerShell colon-prefix scope
          # parsing, embedded-quote escaping, multi-line YAML indent rules).
          # Reading inputs from $env:* keeps the script lint-stable and the
          # body byte-stable across runs.
          $tag       = $env:TAG_NAME
          $instPath  = $env:INSTALLER_PATH
          $instSha   = $env:INSTALLER_SHA
          $instName  = $env:INSTALLER_NAME
          $zipPath   = $env:ZIP_PATH
          $zipSha    = $env:ZIP_SHA
          $zipName   = $env:ZIP_NAME

          # Slice body from Notes mode. Read from the same CHANGELOG.md
          # the Promote step just modified, NOT from a steps.*.body context
          # (which had encoding problems on multi-line bodies).
          $env:GITHUB_REPOSITORY = '${{ github.repository }}'
          $sliceBody = (& ./.github/scripts/Update-Changelog.ps1 -Mode Notes -ForVersion -Version $tag) -join "`n"
          $sliceBody = $sliceBody.Trim()
          if (-not $sliceBody) {
            $sliceBody = '_Maintenance release; see commit log for details._'
          }

          # File integrity table from the actual built artifacts. Sizes are
          # rendered in MB / KB / B, depending on magnitude, so a 27 MB
          # installer doesn't show as 27000000 bytes.
          function Format-Bytes($bytes) {
            if ($bytes -ge 1048576) { return ('{0:F1} MB' -f ($bytes / 1048576)) }
            if ($bytes -ge 1024)    { return ('{0:F1} KB' -f ($bytes / 1024)) }
            return "$bytes B"
          }
          $instSize = Format-Bytes (Get-Item $instPath).Length
          $zipSize  = Format-Bytes (Get-Item $zipPath).Length

          # Optional extras file at release/<tag>/extra-details.md. If present,
          # appended below the slice with a `---` separator and `## Additional
          # notes` heading. Pre-publish validation runs on the composed body
          # so any AI-tells in the extras get flagged the same as if they
          # were in a commit subject.
          $extrasPath = Join-Path $PWD "release/$tag/extra-details.md"
          $extrasBody = $null
          if (Test-Path $extrasPath) {
            $extrasBody = ([System.IO.File]::ReadAllText($extrasPath, [System.Text.UTF8Encoding]::new($false))).Trim()
            Write-Host "Found extras file at $extrasPath ($($extrasBody.Length) chars)."
          } else {
            Write-Host "No extras file at $extrasPath. Body = slice only."
          }

          $sb = New-Object System.Text.StringBuilder
          [void]$sb.AppendLine("## OpenVR-SpaceCalibrator $tag")
          [void]$sb.AppendLine('')
          [void]$sb.AppendLine('Two download options:')
          [void]$sb.AppendLine('')
          [void]$sb.AppendLine("- **$instName** -- guided installer. Run it; it places the overlay and the SteamVR driver in the right places automatically.")
          [void]$sb.AppendLine("- **$zipName** -- drop-in zip. Extract anywhere, copy the ``driver_01spacecalibrator/`` folder into ``<Steam>\steamapps\common\SteamVR\drivers\``, and run ``SpaceCalibrator.exe`` from wherever you put it.")
          [void]$sb.AppendLine('')
          [void]$sb.AppendLine('| File | Size | SHA256 |')
          [void]$sb.AppendLine('|---|---|---|')
          [void]$sb.AppendLine("| ``$instName`` | $instSize | ``$instSha`` |")
          [void]$sb.AppendLine("| ``$zipName`` | $zipSize | ``$zipSha`` |")
          [void]$sb.AppendLine('')
          [void]$sb.AppendLine('---')
          [void]$sb.AppendLine('')
          [void]$sb.AppendLine($sliceBody)
          if ($extrasBody) {
            [void]$sb.AppendLine('')
            [void]$sb.AppendLine('---')
            [void]$sb.AppendLine('')
            [void]$sb.AppendLine('## Additional notes')
            [void]$sb.AppendLine('')
            [void]$sb.AppendLine($extrasBody)
          }
          $body = $sb.ToString()

          # Stash to a temp file for the create + smoke-check steps. Both
          # consume it via path so the multi-line content survives any
          # GITHUB_OUTPUT escaping quirks.
          $stash = Join-Path $env:RUNNER_TEMP 'release-body.md'
          [System.IO.File]::WriteAllText($stash, $body, [System.Text.UTF8Encoding]::new($false))
          "stash=$stash" >> $env:GITHUB_OUTPUT
          Write-Host "Composed body: $($body.Length) chars at $stash."

      - name: Validate release body
        # Pre-publish grep: AI-tells, internal-tooling vocabulary, false-date
        # claims, residual non-ASCII, stray @WhyKnot. Soft mode: warnings only,
        # exits 0. Findings show up as ::warning:: annotations on the workflow
        # run; the maintainer reviews and amends commit subjects (or the
        # extras file) for the next release.
        shell: pwsh
        run: |
          & ./.github/scripts/Update-Changelog.ps1 -Mode Validate -Path '${{ steps.compose.outputs.stash }}'

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag   = "${{ github.ref_name }}"
          $zip   = "${{ steps.zip.outputs.path }}"
          $inst  = "${{ steps.installer.outputs.path }}"
          $stash = "${{ steps.compose.outputs.stash }}"
          gh release create $tag $zip $inst --title $tag --notes-file $stash

      - name: Verify published body matches composed body
        # Smoke check: fetch the published release body via gh and diff against
        # what we sent. GitHub occasionally re-encodes line endings and
        # trailing whitespace; the comparison is line-ending-normalised + Trim
        # to dodge those false-positives. Real divergence (markdown swallowed,
        # body truncated, GitHub auto-prepended its own auto-notes, etc.)
        # surfaces as a workflow warning that the maintainer can react to.
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $stash = '${{ steps.compose.outputs.stash }}'
          $expected = ([System.IO.File]::ReadAllText($stash, [System.Text.UTF8Encoding]::new($false))).Trim()
          $published = (gh release view $env:TAG_NAME --json body | ConvertFrom-Json).body.Trim()
          $expectedN  = ($expected  -replace "`r`n", "`n").TrimEnd()
          $publishedN = ($published -replace "`r`n", "`n").TrimEnd()
          if ($expectedN -ne $publishedN) {
            Write-Warning "Published release body does not byte-match the composed body."
            Write-Host "expected length: $($expectedN.Length)"
            Write-Host "published length: $($publishedN.Length)"
            # Best-effort diff context: dump the first divergent line.
            $eLines = $expectedN -split "`n"
            $pLines = $publishedN -split "`n"
            for ($i = 0; $i -lt [math]::Min($eLines.Count, $pLines.Count); $i++) {
              if ($eLines[$i] -ne $pLines[$i]) {
                Write-Host ("first divergence at line {0}:" -f ($i + 1))
                Write-Host ("  expected:  {0}" -f $eLines[$i])
                Write-Host ("  published: {0}" -f $pLines[$i])
                break
              }
            }
            if ($eLines.Count -ne $pLines.Count) {
              Write-Host ("line counts differ: expected={0} published={1}" -f $eLines.Count, $pLines.Count)
            }
          } else {
            Write-Host "Published body byte-matches composed body. ($($expectedN.Length) chars)"
          }

      - name: Push promoted CHANGELOG back to main
        # Replay the stashed (promoted) files onto main so subsequent commits
        # build on the new state -- next push starts with a fresh "## Unreleased".
        # main is not branch-protected on RealWhyKnot/OpenVR-SpaceCalibrator, so
        # GITHUB_TOKEN can push directly. [skip changelog] keeps changelog-append
        # from re-bulleting this commit.
        # Done last so a build/publish failure doesn't push a phantom-promoted
        # CHANGELOG to main.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Switch to main from the tag-detached HEAD.
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          # Replay the stashed promoted files.
          cp .changelog-stash/CHANGELOG.md           CHANGELOG.md
          cp .changelog-stash/wiki/Changelog.md wiki/Changelog.md

          if [[ -z "$(git status --porcelain CHANGELOG.md wiki/Changelog.md)" ]]; then
            echo "Nothing to promote -- main is already in promoted state."
            exit 0
          fi

          git add CHANGELOG.md wiki/Changelog.md
          git commit -m "docs(changelog): promote Unreleased -> ${TAG_NAME} [skip changelog]"
          git push origin main
