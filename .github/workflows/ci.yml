name: CI

# Triggered on PRs and on manual dispatch. We deliberately do NOT run CI on
# direct pushes to main: every release-tag push triggers release.yml, which
# does a full build via build.ps1 — running CI on the same SHA would be pure
# duplication. Direct-to-main pushes that aren't part of a release (docs,
# wiki, hot fixes between releases) are validated locally via build.ps1; the
# next release-tag push gives us the CI signal anyway.
#
# To run CI manually for a specific commit, use the "Run workflow" button on
# the Actions page (triggers workflow_dispatch).
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        # The minhook submodule's CMakeLists declares cmake_minimum_required(2.8.12)
        # which CMake 4.x rejects. The policy-version override lets us configure
        # without forking the submodule. Mirror this in build.ps1.
        # -Wno-dev silences developer-mode warnings from the minhook submodule
        # and from GoogleTest's FetchContent module — both are upstream code we
        # don't control.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B bin -S . -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -Wno-dev

      - name: Build
        run: cmake --build bin --config Release --parallel

      - name: Run tests
        # Don't gate the workflow on test failure yet — the suite is brand new
        # and we want CI to keep producing artifacts while tolerances stabilize.
        # Flip continue-on-error to false in a follow-up once the suite is proven.
        continue-on-error: true
        run: ./bin/artifacts/Release/spacecal_tests.exe --gtest_color=yes

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Path "bin/artifacts/Release/SpaceCalibrator.exe" -Destination $stage
          Copy-Item -Path "bin/driver_01spacecalibrator" -Destination $stage -Recurse

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spacecalibrator-${{ github.sha }}
          path: stage
          if-no-files-found: error
          retention-days: 14
