name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  pull_request:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        # The minhook submodule's CMakeLists declares cmake_minimum_required(2.8.12)
        # which CMake 4.x rejects. The policy-version override lets us configure
        # without forking the submodule. Mirror this in build.ps1.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B bin -S . -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build bin --config Release --parallel

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Path "bin/artifacts/Release/SpaceCalibrator.exe" -Destination $stage
          Copy-Item -Path "bin/driver_01spacecalibrator" -Destination $stage -Recurse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spacecalibrator-${{ github.sha }}
          path: stage
          if-no-files-found: error
          retention-days: 14
