name: Bug report
description: Something is broken.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        If you are having trouble setting this up with SteamVR and would like help, the fastest way is to ask in the [Discord group](https://discord.com/invite/m7g2Wyj).

        If you are having issues after updating SteamVR, please check for a new release at the [releases page](https://github.com/RealWhyKnot/OpenVR-SpaceCalibrator/releases) before posting an issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you do, what did you expect, what happened instead?
      placeholder: |
        Steps to reproduce:
        1. ...
        2. ...
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: dropdown
    id: tracking-systems
    attributes:
      label: Tracking systems involved
      multiple: true
      options:
        - Lighthouse (Vive / Index / Tundra)
        - Oculus / Meta (Quest Link, Air Link, Rift)
        - SlimeVR
        - Pimax Crystal
        - WMR / HP Reverb
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: spacecal-version
    attributes:
      label: SpaceCalibrator version
      description: From `version.txt` next to the executable, or the About panel.
      placeholder: e.g. 1.12-whyknot.4
    validations:
      required: true

  - type: input
    id: steamvr-version
    attributes:
      label: SteamVR version
      placeholder: e.g. 2.5.5
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Attach or paste the CSV log from `%LOCALAPPDATA%\Low\SpaceCalibrator\Logs\spacecal_log.<timestamp>.txt`,
        plus any relevant SteamVR `vrserver.txt` excerpts.
      render: text

  - type: textarea
    id: extra-context
    attributes:
      label: Anything else?
      description: Screenshots, videos, hardware notes, recent driver changes — anything that might help.
